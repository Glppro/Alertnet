<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE OVERHAUL | AlertNet Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.4);
            --bg: #010103;
            --surface: #07070a;
            --border: rgba(0, 242, 255, 0.12);
            --text: #f8fafc;
            --accent: #7000ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        /* --- BACKGROUND EFFECTS --- */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 120%);
            pointer-events: none; z-index: 10;
        }

        /* --- DASHBOARD LAYOUT --- */
        .side-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-display {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.05);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
        }

        /* --- WORLD MAP SIMULATION --- */
        .map-container {
            flex: 1;
            background: url('https://upload.wikimedia.org/wikipedia/commons/4/41/Simple_world_map.svg') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            filter: invert(1) sepia(1) saturate(5) hue-rotate(150deg);
            position: relative;
        }

        .ping {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(10); opacity: 0; }
        }

        /* --- BIO SCANNER --- */
        .scanner {
            height: 150px;
            position: relative;
            background: rgba(0, 242, 255, 0.02);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .scan-bar {
            width: 100%; height: 2px;
            background: var(--primary);
            position: absolute;
            top: 0;
            box-shadow: 0 0 20px var(--primary);
            animation: scan-move 3s infinite ease-in-out;
        }
        @keyframes scan-move {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }

        /* --- DATA GRAPHS --- */
        .graph-line {
            height: 40px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        .bar {
            width: 4px;
            background: var(--primary);
            animation: grow 0.5s infinite alternate;
        }
        @keyframes grow { from { height: 20%; } to { height: 100%; } }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed; top: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .toast {
            background: rgba(0, 242, 255, 0.1);
            border-left: 3px solid var(--primary);
            padding: 12px 20px;
            font-size: 11px;
            font-family: 'JetBrains Mono';
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .glitch-text {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text);
            text-shadow: 2px 0 var(--accent), -2px 0 var(--primary);
        }

    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="side-panel">
        <div class="card">
            <h3 style="font-size: 12px; color: var(--primary); margin-bottom: 10px;">AUTH STATUS</h3>
            <div class="scanner">
                <div class="scan-bar"></div>
                <div style="font-size: 10px; padding: 10px; color: var(--primary); opacity: 0.6;">
                    SCANNING BIO-DATA...<br>IDENT: ADMIN_V3<br>LEVEL: CLEARANCE_RED
                </div>
            </div>
        </div>

        <div class="card" style="flex: 1;">
            <h3 style="font-size: 12px; color: var(--primary); margin-bottom: 15px;">LIVE TRAFFIC</h3>
            <div id="traffic-logs" style="font-family: 'JetBrains Mono'; font-size: 10px; color: #64748b;">
                </div>
        </div>

        <div class="card">
            <h3 style="font-size: 12px; color: var(--primary); margin-bottom: 10px;">CPU LOAD</h3>
            <div class="graph-line" id="cpu-graph"></div>
        </div>
    </div>

    <div class="main-display">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1 class="glitch-text" style="font-size: 40px;">System Offline</h1>
                <p style="color: #64748b; font-family: 'JetBrains Mono';">ALERTNET_SENTINEL_V3.0 // MAINT_MODE</p>
            </div>
            <div style="text-align: right;">
                <div id="clock" style="font-size: 24px; font-weight: 800;">00:00:00</div>
                <div style="color: var(--primary); font-size: 10px;">UTC/GMT +1</div>
            </div>
        </div>

        <div class="map-container" id="map"></div>

        <div style="border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: space-between;">
            <div style="font-size: 12px; color: #64748b;">
                <i class="fa-solid fa-circle-notch fa-spin"></i> SINCRONIZZAZIONE NODI GLOBALI...
            </div>
            <div style="display: flex; gap: 20px;">
                <span style="font-size: 12px; color: var(--primary);">ENCRYPTION: AES-256</span>
                <span style="font-size: 12px; color: var(--primary);">SHARDS: 12/12</span>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // Orologio
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        // Generatore di Grafico CPU
        const graph = document.getElementById('cpu-graph');
        for(let i=0; i<40; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDelay = `${i * 0.05}s`;
            graph.appendChild(bar);
        }

        // Notifiche Toast Casuali
        const events = [
            "Firewall rule #882 updated",
            "Node MILAN-01 synchronized",
            "DDoS mitigation active",
            "Database shard encrypted",
            "Memory buffer cleared"
        ];

        function createToast() {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i class="fa-solid fa-info-circle"></i> ${events[Math.floor(Math.random()*events.length)]}`;
            container.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
        setInterval(createToast, 6000);

        // Logs di traffico
        const traffic = document.getElementById('traffic-logs');
        setInterval(() => {
            const entry = document.createElement('div');
            entry.style.marginBottom = "5px";
            entry.innerHTML = `<span style="color:var(--primary)">[${new Date().toLocaleTimeString()}]</span> REQ_IN: ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.X.X`;
            traffic.prepend(entry);
            if(traffic.childNodes.length > 15) traffic.removeChild(traffic.lastChild);
        }, 2000);

        // Punti sulla mappa casuali
        const map = document.getElementById('map');
        function addPing() {
            const ping = document.createElement('div');
            ping.className = 'ping';
            ping.style.left = Math.random() * 90 + '%';
            ping.style.top = Math.random() * 90 + '%';
            map.appendChild(ping);
            setTimeout(() => ping.remove(), 2000);
        }
        setInterval(addPing, 1500);

    </script>
</body>
</html>
